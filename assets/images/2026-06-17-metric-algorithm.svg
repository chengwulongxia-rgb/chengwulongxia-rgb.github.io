<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0L8,3L0,6Z" fill="#58a6ff"/></marker>
  </defs>
  <rect width="700" height="520" fill="#0d1117" rx="8"/>
  <pattern id="p" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0L0 0 0 30" fill="none" stroke="#1e293b" stroke-width=".5"/></pattern>
  <rect width="700" height="520" fill="url(#p)" opacity=".4"/>

  <text x="350" y="26" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700" font-family="system-ui,sans-serif">Metric Match 演算法（4 Steps）</text>

  <rect x="120" y="38" width="460" height="30" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="350" y="58" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui,sans-serif">Input：母體 X (N 筆) · LLM judge M · 輔助 judges M'₁..M'ₖ · 預算 b · 候選子集 C=20</text>

  <line x1="350" y1="68" x2="350" y2="85" stroke="#58a6ff" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 1 -->
  <rect x="50" y="88" width="600" height="65" rx="8" fill="#0d2a1a" stroke="#3fb950" stroke-width="2"/>
  <text x="64" y="108" fill="#3fb950" font-size="13" font-weight="700" font-family="system-ui,sans-serif">Step 1 · 計算母體 Inter-Model Metric（完全免費）</text>
  <text x="64" y="128" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">ρ_IM_pop = avg( T( M(x), M'ⱼ(x) ) ) for all x∈X, j∈[1..k]</text>
  <text x="64" y="145" fill="#3fb950" font-size="10" font-family="system-ui,sans-serif">▸ 不需要任何人類標註，LLM 跑一遍就有。這是整個方法能省錢的關鍵</text>

  <line x1="350" y1="153" x2="350" y2="170" stroke="#58a6ff" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="50" y="173" width="600" height="80" rx="8" fill="#0d2a3a" stroke="#58a6ff" stroke-width="2"/>
  <text x="64" y="193" fill="#58a6ff" font-size="13" font-weight="700" font-family="system-ui,sans-serif">Step 2 · Rejection Sampling（也是免費）</text>
  <text x="64" y="213" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">for i = 1 to C=20:</text>
  <text x="80" y="230" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">Sᵢ ← random_subset(X, b)     // 隨機抽 b 筆</text>
  <text x="80" y="247" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">ρᵢ ← compute_inter_model(Sᵢ)  // 算子集 inter-model metric</text>
  <text x="64" y="264" fill="#f0883e" font-size="11" font-family="system-ui,sans-serif">S* = argmin |ρᵢ − ρ_IM_pop|  ← 挑 inter-model metric 最接近母體的子集</text>

  <line x1="350" y1="253" x2="350" y2="278" stroke="#58a6ff" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 3 -->
  <rect x="100" y="281" width="500" height="55" rx="8" fill="#2a1a0d" stroke="#f0883e" stroke-width="2"/>
  <text x="114" y="301" fill="#f0883e" font-size="13" font-weight="700" font-family="system-ui,sans-serif">Step 3 · 人類標註（唯一花錢的步驟）</text>
  <text x="114" y="321" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">只對 S* 中的 b 筆樣本進行人類標註 H(x)</text>
  <text x="114" y="335" fill="#f85149" font-size="10" font-family="system-ui,sans-serif">醫療場景: $14/筆 × 46 筆 ≈ $644（vs 隨機抽 150 筆 $2,100 → 省 $1,041.67）</text>

  <line x1="350" y1="336" x2="350" y2="355" stroke="#58a6ff" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 4 -->
  <rect x="120" y="358" width="460" height="40" rx="8" fill="#1a0d2a" stroke="#a371f7" stroke-width="2"/>
  <text x="350" y="382" text-anchor="middle" fill="#a371f7" font-size="13" font-weight="700" font-family="system-ui,sans-serif">Step 4 · 估計母體 Reliability：ρ̂ = T( { (M(x), H(x)) for x∈S* } )</text>

  <!-- Key insight -->
  <rect x="50" y="415" width="600" height="52" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="350" y="435" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="700" font-family="system-ui,sans-serif">核心洞見</text>
  <text x="350" y="455" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui,sans-serif">Step 1 &amp; 2 完全不需要人類標註 → 用免費的模型間一致性當 proxy → 錢花在最值得標註的子集上</text>

  <text x="350" y="492" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="system-ui,sans-serif">結果：Win-rate 0.838 vs 隨機 · 估計誤差 −18.7% · 標註預算 −32.5%</text>
</svg>
