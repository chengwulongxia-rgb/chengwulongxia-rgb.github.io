<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360">
  <rect width="720" height="360" fill="#0d1117" rx="8"/>
  <pattern id="p" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0L0 0 0 30" fill="none" stroke="#1e293b" stroke-width=".5"/></pattern>
  <rect width="720" height="360" fill="url(#p)" opacity=".4"/>

  <text x="360" y="26" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700" font-family="system-ui,sans-serif">信任生命週期：形成 → 破裂 → 恢復</text>

  <text x="20" y="200" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui,sans-serif" transform="rotate(-90,20,200)">驗證量</text>

  <line x1="50" y1="280" x2="670" y2="280" stroke="#30363d" stroke-width="1"/>
  <line x1="50" y1="50" x2="50" y2="280" stroke="#30363d" stroke-width="1"/>
  <text x="670" y="296" text-anchor="end" fill="#8b949e" font-size="9" font-family="system-ui,sans-serif">局數 →</text>

  <!-- Phase backgrounds -->
  <rect x="50" y="50" width="235" height="230" rx="0" fill="#0d2a1a" opacity=".3"/>
  <rect x="285" y="50" width="130" height="230" rx="0" fill="#2a0d1a" opacity=".3"/>
  <rect x="415" y="50" width="255" height="230" rx="0" fill="#1a0d2a" opacity=".3"/>

  <text x="167" y="72" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700" font-family="system-ui,sans-serif">Phase 1 · FORMATION</text>
  <text x="167" y="88" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui,sans-serif">D 永遠正確 · ~10-15 局</text>

  <text x="350" y="72" text-anchor="middle" fill="#f85149" font-size="12" font-weight="700" font-family="system-ui,sans-serif">Phase 2</text>
  <text x="350" y="88" text-anchor="middle" fill="#f85149" font-size="12" font-weight="700" font-family="system-ui,sans-serif">BREAKAGE</text>
  <text x="350" y="100" text-anchor="middle" fill="#8b949e" font-size="9" font-family="system-ui,sans-serif">D 犯錯 · 1-2 局</text>

  <text x="542" y="72" text-anchor="middle" fill="#a371f7" font-size="12" font-weight="700" font-family="system-ui,sans-serif">Phase 3 · RECOVERY</text>
  <text x="542" y="88" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui,sans-serif">D 恢復可靠 · ~15-20+ 局</text>

  <!-- Trust curve -->
  <polyline points="50,260 100,240 160,200 220,175 280,170 285,170 300,260 340,260 360,225 415,225 440,210 480,195 540,180 620,175 670,175" fill="none" stroke="#58a6ff" stroke-width="3" stroke-linejoin="round"/>

  <!-- Annotations -->
  <text x="140" y="225" fill="#3fb950" font-size="9" font-family="system-ui,sans-serif">信任逐步形成</text>
  <text x="140" y="237" fill="#3fb950" font-size="9" font-family="system-ui,sans-serif">驗證 −60~85%</text>

  <text x="300" y="155" text-anchor="middle" fill="#f85149" font-size="9" font-family="system-ui,sans-serif">信任瞬間</text>
  <text x="300" y="167" text-anchor="middle" fill="#f85149" font-size="9" font-family="system-ui,sans-serif">破裂</text>

  <text x="480" y="195" fill="#a371f7" font-size="9" font-family="system-ui,sans-serif">恢復比形成更慢</text>
  <text x="480" y="207" fill="#a371f7" font-size="9" font-family="system-ui,sans-serif">集群失敗 ≫ 分散失敗</text>

  <!-- Delta annotations -->
  <text x="160" y="150" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="system-ui,sans-serif">Δtrust &lt; 0</text>
  <text x="160" y="162" text-anchor="middle" fill="#8b949e" font-size="9" font-family="system-ui,sans-serif">信任形成</text>

  <text x="350" y="155" text-anchor="middle" fill="#f85149" font-size="10" font-family="system-ui,sans-serif">ΔQ4 &gt; 0</text>
  <text x="350" y="167" text-anchor="middle" fill="#8b949e" font-size="9" font-family="system-ui,sans-serif">針對犯錯者</text>

  <!-- Bottom comparison -->
  <rect x="50" y="295" width="620" height="52" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="314" text-anchor="middle" fill="#e6edf3" font-size="11" font-family="system-ui,sans-serif">集群失敗（3 錯 / 5 局）：懷疑 ████████████████████ 長</text>
  <text x="360" y="334" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">分散失敗（3 錯分散）：懷疑 ██████ 短 —— 同樣錯誤數，破壞力完全不同</text>
</svg>
