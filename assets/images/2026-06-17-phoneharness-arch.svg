<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0L8,3L0,6Z" fill="#58a6ff"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0L8,3L0,6Z" fill="#f0883e"/></marker>
  </defs>
  <rect width="720" height="520" fill="#0d1117" rx="8"/>
  <pattern id="g" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0L0 0 0 30" fill="none" stroke="#1e293b" stroke-width=".5"/></pattern>
  <rect width="720" height="520" fill="url(#g)" opacity=".5"/>

  <text x="360" y="28" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="700" font-family="system-ui,sans-serif">PhoneHarness Host-Device 架構</text>

  <!-- HOST SIDE -->
  <rect x="30" y="44" width="660" height="170" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="360" y="66" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="700" font-family="system-ui,sans-serif">HOST SIDE（主機端）</text>

  <rect x="60" y="80" width="180" height="105" rx="6" fill="#0d2a3a" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="150" y="100" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700" font-family="system-ui,sans-serif">Model Proxy</text>
  <text x="150" y="118" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">OpenAI-compatible API</text>
  <text x="150" y="136" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">模型推論轉發</text>
  <text x="150" y="154" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">支援 thinking on/off</text>

  <rect x="270" y="80" width="180" height="105" rx="6" fill="#1a2e0d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="360" y="100" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700" font-family="system-ui,sans-serif">GUI Proxy</text>
  <text x="360" y="118" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">screenshot / tap / swipe</text>
  <text x="360" y="136" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">text input / app launch</text>
  <text x="360" y="154" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">UI-tree 擷取</text>

  <rect x="480" y="80" width="180" height="105" rx="6" fill="#2a1a0d" stroke="#f0883e" stroke-width="1.5"/>
  <text x="570" y="100" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="700" font-family="system-ui,sans-serif">MCP Proxy</text>
  <text x="570" y="118" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">search / email</text>
  <text x="570" y="136" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">documents / file I/O</text>
  <text x="570" y="154" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui,sans-serif">external API tools</text>

  <line x1="150" y1="186" x2="360" y2="235" stroke="#58a6ff" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="360" y1="186" x2="360" y2="235" stroke="#3fb950" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="570" y1="186" x2="360" y2="235" stroke="#f0883e" stroke-width="2" marker-end="url(#a2)"/>
  <text x="260" y="218" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui,sans-serif">ADB/USB</text>
  <text x="480" y="218" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui,sans-serif">API calls</text>

  <!-- DEVICE SIDE -->
  <rect x="30" y="238" width="660" height="262" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="360" y="260" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="700" font-family="system-ui,sans-serif">DEVICE SIDE（裝置端）</text>

  <rect x="55" y="272" width="610" height="120" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="360" y="290" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="700" font-family="system-ui,sans-serif">Phone-Agent Server</text>

  <rect x="75" y="300" width="175" height="70" rx="5" fill="#0d1a2a" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="162" y="320" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700" font-family="system-ui,sans-serif">Agent Loop</text>
  <text x="162" y="338" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui,sans-serif">決定下一步動作</text>
  <text x="162" y="354" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui,sans-serif">狀態追蹤與決策</text>

  <rect x="270" y="300" width="175" height="70" rx="5" fill="#0d2a1a" stroke="#3fb950" stroke-width="1.2"/>
  <text x="357" y="320" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700" font-family="system-ui,sans-serif">Tool Registry</text>
  <text x="357" y="338" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui,sans-serif">註冊可用工具</text>
  <text x="357" y="354" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui,sans-serif">管理工具生命週期</text>

  <rect x="465" y="300" width="175" height="70" rx="5" fill="#1a0d2a" stroke="#a371f7" stroke-width="1.2"/>
  <text x="552" y="320" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="700" font-family="system-ui,sans-serif">Skill Loader</text>
  <text x="552" y="338" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui,sans-serif">Progressive Disclosure</text>
  <text x="552" y="354" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui,sans-serif">按需載入技能</text>

  <rect x="80" y="398" width="560" height="42" rx="5" fill="#0d1117" stroke="#f0883e" stroke-width="1.5"/>
  <text x="360" y="415" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="700" font-family="system-ui,sans-serif">MIXED ACTION SPACE</text>
  <text x="180" y="430" text-anchor="middle" fill="#3fb950" font-size="10" font-family="system-ui,sans-serif">GUI（tap/swipe）</text>
  <text x="360" y="430" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="system-ui,sans-serif">CLI（shell/ADB）</text>
  <text x="540" y="430" text-anchor="middle" fill="#f0883e" font-size="10" font-family="system-ui,sans-serif">TOOL（MCP）</text>

  <rect x="80" y="448" width="560" height="32" rx="5" fill="#2a0d1a" stroke="#f85149" stroke-width="1.2"/>
  <text x="360" y="468" text-anchor="middle" fill="#f85149" font-size="11" font-weight="700" font-family="system-ui,sans-serif">TRACE LOGGING · 可稽核執行軌跡（Outer + Nested GUI Traces）</text>
</svg>
