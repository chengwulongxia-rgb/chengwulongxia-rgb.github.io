  <text x="778" y="291" text-anchor="middle" fill="#00d4ff" font-family="system-ui, sans-serif" font-size="8" font-weight="700">E13</text>
  <rect x="800" y="272" width="32" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="816" y="291" text-anchor="middle" fill="#484f58" font-family="system-ui, sans-serif" font-size="8">E14</text>
  <rect x="838" y="272" width="32" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="854" y="291" text-anchor="middle" fill="#484f58" font-family="system-ui, sans-serif" font-size="8">E15</text>
  <rect x="876" y="272" width="32" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="892" y="291" text-anchor="middle" fill="#484f58" font-family="system-ui, sans-serif" font-size="8">E16</text>

  <!-- Row 3 -->
  <rect x="610" y="304" width="32" height="28" rx="4" fill="#00d4ff" opacity="0.3" stroke="#00d4ff" stroke-width="2"/>
  <text x="626" y="323" text-anchor="middle" fill="#00d4ff" font-family="system-ui, sans-serif" font-size="8" font-weight="700">E17</text>
  <rect x="648" y="304" width="32" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
