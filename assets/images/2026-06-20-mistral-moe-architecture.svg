  <line x1="700" y1="196" x2="664" y2="240" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
  <line x1="700" y1="196" x2="750" y2="240" stroke="#00ff88" stroke-width="1.5" opacity="0.8"/>
