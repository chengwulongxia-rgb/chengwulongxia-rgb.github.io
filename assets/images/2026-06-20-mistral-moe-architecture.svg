  <text x="626" y="259" text-anchor="middle" fill="#484f58" font-family="system-ui, sans-serif" font-size="8">E1</text>
  <rect x="648" y="240" width="32" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="664" y="259" text-anchor="middle" fill="#484f58" font-family="system-ui, sans-serif" font-size="8">E2</text>
