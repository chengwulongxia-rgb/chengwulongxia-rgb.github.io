  <rect x="762" y="336" width="32" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="778" y="355" text-anchor="middle" fill="#484f58" font-family="system-ui, sans-serif" font-size="8">...</text>
  <rect x="800" y="336" width="32" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="816" y="355" text-anchor="middle" fill="#484f58" font-family="system-ui, sans-serif" font-size="8">...</text>
  <rect x="838" y="336" width="32" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="854" y="355" text-anchor="middle" fill="#484f58" font-family="system-ui, sans-serif" font-size="8">...</text>
  <rect x="876" y="336" width="32" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="892" y="355" text-anchor="middle" fill="#484f58" font-family="system-ui, sans-serif" font-size="8">...</text>

  <!-- Expert count label -->
