<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560">
  <rect width="1000" height="560" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="500" y="42" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700">MoE vs Dense Model：誰在真正節省算力？</text>
  <line x1="280" y1="54" x2="720" y2="54" stroke="#30363d" stroke-width="1"/>

  <!-- ===== LEFT: Dense Model ===== -->
  <text x="250" y="88" text-anchor="middle" fill="#00d4ff" font-family="system-ui, sans-serif" font-size="16" font-weight="700">傳統 Dense 模型</text>

  <!-- Input -->
  <rect x="175" y="105" width="150" height="36" rx="6" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
  <text x="250" y="128" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="13">Input Token</text>

  <!-- Arrow 1 -->
  <line x1="250" y1="141" x2="250" y2="165" stroke="#484f58" stroke-width="2" marker-end="url(#arrowDim)"/>

  <!-- Single FFN box (dense, all active) -->
  <rect x="130" y="165" width="240" height="100" rx="8" fill="#161b22" stroke="#ffa500" stroke-width="2"/>
  <text x="250" y="194" text-anchor="middle" fill="#ffa500" font-family="system-ui, sans-serif" font-size="14" font-weight="600">單一 FFN 層（Dense）</text>
  <text x="250" y="216" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="12">全部參數啟動：7B 活躍</text>
  <text x="250" y="238" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="12">每個 token 使用 100% 權重</text>

  <!-- All active indicator - green dots -->
  <circle cx="155" cy="240" r="4" fill="#00ff88" opacity="0.8"/>
  <circle cx="180" cy="240" r="4" fill="#00ff88" opacity="0.8"/>
  <circle cx="205" cy="240" r="4" fill="#00ff88" opacity="0.8"/>
  <circle cx="295" cy="240" r="4" fill="#00ff88" opacity="0.8"/>
  <circle cx="320" cy="240" r="4" fill="#00ff88" opacity="0.8"/>
  <circle cx="345" cy="240" r="4" fill="#00ff88" opacity="0.8"/>

  <!-- Arrow 2 -->
  <line x1="250" y1="265" x2="250" y2="295" stroke="#484f58" stroke-width="2" marker-end="url(#arrowDim)"/>

  <!-- Output -->
  <rect x="175" y="295" width="150" height="36" rx="6" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
  <text x="250" y="318" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="13">Output Token</text>

  <!-- Cost label -->
  <text x="250" y="365" text-anchor="middle" fill="#ff7b72" font-family="system-ui, sans-serif" font-size="12">💰 每 token 成本：7B 參數運算量</text>

  <!-- ===== RIGHT: MoE ===== -->
  <text x="750" y="88" text-anchor="middle" fill="#00d4ff" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Mistral Small 4 — MoE</text>

  <!-- Input -->
  <rect x="675" y="105" width="150" height="36" rx="6" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
  <text x="750" y="128" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="13">Input Token</text>

  <!-- Arrow -->
