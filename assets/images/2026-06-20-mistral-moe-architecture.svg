  <!-- Divider line -->
  <line x1="500" y1="80" x2="500" y2="540" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowDim" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#484f58"/>
    </marker>
  </defs>

  <!-- Bottom insight -->
  <rect x="100" y="400" width="400" height="110" rx="8" fill="#ffa500" opacity="0.05" stroke="#ffa500" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="300" y="425" text-anchor="middle" fill="#ffa500" font-family="system-ui, sans-serif" font-size="12" font-weight="600">⚠ 城武追問</text>
  <text x="115" y="448" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="11">Router 本身也是運算成本。128 選 4 的調度邏輯</text>
  <text x="115" y="468" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="11">在簡單 query 上是否值得？configurable reasoning</text>
  <text x="115" y="488" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="11">effort 參數的存在，暗示團隊自己也這麼懷疑。</text>

  <!-- Bottom labels -->
  <text x="500" y="555" text-anchor="middle" fill="#484f58" font-family="system-ui, sans-serif" font-size="10">資料來源：Mistral AI 官方技術文件（2026）</text>
</svg>
