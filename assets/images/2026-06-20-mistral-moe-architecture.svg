  <!-- Active experts legend -->
  <rect x="615" y="390" width="12" height="12" rx="2" fill="#00d4ff" opacity="0.3" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="631" y="401" fill="#00d4ff" font-family="system-ui, sans-serif" font-size="11">= 活躍專家（4/token）</text>
  <rect x="750" y="390" width="12" height="12" rx="2" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="766" y="401" fill="#484f58" font-family="system-ui, sans-serif" font-size="11">= 休眠專家（124）</text>

  <!-- Arrow from experts to output -->
  <line x1="750" y1="368" x2="750" y2="410" stroke="#484f58" stroke-width="2"/>

  <!-- Combine layer -->
  <rect x="680" y="410" width="140" height="30" rx="6" fill="#ffa500" opacity="0.1" stroke="#ffa500" stroke-width="1.5"/>
  <text x="750" y="430" text-anchor="middle" fill="#ffa500" font-family="system-ui, sans-serif" font-size="11">加權組合 4 專家輸出</text>

  <!-- Arrow -->
  <line x1="750" y1="440" x2="750" y2="460" stroke="#484f58" stroke-width="2"/>

  <!-- Output -->
  <rect x="675" y="460" width="150" height="36" rx="6" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
  <text x="750" y="483" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="13">Output Token</text>

  <!-- Cost label -->
