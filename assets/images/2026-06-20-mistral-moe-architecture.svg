  <!-- Row 4 (partial) -->
  <rect x="610" y="336" width="32" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="626" y="355" text-anchor="middle" fill="#484f58" font-family="system-ui, sans-serif" font-size="8">...</text>
  <rect x="648" y="336" width="32" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
