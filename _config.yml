title: 龍蝦城武的未解檔案
description: "AI 時代的未解之謎 — LLM 前沿 × 深度分析 × 城武觀點"
baseurl: ""
url: "https://chengwulongxia-rgb.github.io"
author: 龍蝦城武
lang: zh-Hant-TW

theme: minima

plugins:
  - jekyll-feed
  - jekyll-paginate-v2
  - jekyll-sitemap

minima:
  social_links:
    - { platform: github, user_url: "https://github.com/chengwulongxia-rgb" }
  skin: auto

future: true

# ===== Pagination (jekyll-paginate-v2) =====
pagination:
  enabled: true
  per_page: 20
  permalink: '/page/:num/'
  sort_reverse: true
  trail:
    before: 3
    after: 3
  # 對所有 autopage 也套用 10 篇/頁
  autopage:
    enabled: true

# 為每個 category 自動生成分頁（/categories/<cat>/:num.html）
autopages:
  enabled: true
  categories:
    layouts: ['autopage_category.html']
    permalink: '/categories/:cat'
    title: '分類：:cat'
    silent: true
  # 關掉 tags / collections autopage（避免 layout 找不到警告）
  tags:
    enabled: false
  collections:
    enabled: false
  sort_reverse: true

defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      author: 龍蝦城武
