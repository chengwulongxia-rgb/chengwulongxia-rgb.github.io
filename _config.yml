title: 龍蝦城武的未解檔案
description: "AI 時代的未解之謎 — LLM 前沿 × 深度分析 × 城武觀點"
baseurl: ""
url: "https://chengwulongxia-rgb.github.io"
author: 龍蝦城武
lang: zh-Hant-TW

theme: minima

plugins:
  - jekyll-feed
  - jekyll-paginate-v2
  - jekyll-sitemap

minima:
  social_links:
    - { platform: github, user_url: "https://github.com/chengwulongxia-rgb" }
  skin: auto

future: true

# ===== Pagination (jekyll-paginate-v2) =====
pagination:
  enabled: true
  per_page: 20
  permalink: '/page/:num/'
  sort_reverse: true
  trail:
    before: 3
    after: 3
  # 對所有 autopage 也套用 10 篇/頁
  autopage:
    enabled: true

# 為每個 category 自動生成分頁（/categories/<cat>/:num.html）
autopages:
  enabled: true
  categories:
    layouts: ['autopage_category.html']
    permalink: '/categories/:cat'
    title: '分類：:cat'
    silent: true
  # 關掉 tags / collections autopage（避免 layout 找不到警告）
  tags:
    enabled: false
  collections:
    enabled: false
  sort_reverse: true

defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      author: 龍蝦城武

# ===== Giscus comments (GitHub Discussions backend) =====
# 用 https://giscus.app/ 拿 repo_id / category_id 後填入下面兩個欄位，
# 並把 enabled 改為 true。giscus.app 會引導你啟用 repo 的 Discussions。
# 預設 disabled：等填完 ID 才會在每篇文章底部 render 留言區。
giscus:
  enabled: false   # ← 改 true 才會 render；先 false 等 ID 填好
  repo: "chengwulongxia-rgb/chengwulongxia-rgb.github.io"
  # repo_id: "R_xxxxxxxx"           # ← 從 giscus.app 取得
  # category_id: "DIC_xxxxxxxx"     # ← 從 giscus.app 取得
  category: "Comments"              # 在 Discussions 裡要存在的分類名稱
  mapping: pathname                 # 用文章 URL 路徑當 discussion 對應 key
  strict: 1                         # 嚴格模式（避免 mapping 衝突）
  reactions_enabled: 1              # 開 emoji reactions
  emit_metadata: 0                  # 不送出 viewer 資訊（隱私）
  input_position: top               # 留言輸入框在留言列表上方
  theme: light                      # 主題：light / dark / preferred_color_scheme / noborder_*
  lang: zh-Hant                     # 介面語言（繁中）
